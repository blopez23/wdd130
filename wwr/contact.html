<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Provides an overview, information about means to contact the staff">
    <meta name="author" content="Benjamin Lopez Gonzalez">
    <title>Contact us | Z Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-raftingbw.webp" alt="Logo of Rafting page" width="200">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contactinfo">
            <h1>Contact Us</h1>

            <h2>Send us a message</h2>

            <p>Z Water Rafting</p>

            <p>999-999-9999</p>

            <p>Email: <a href="mailto"> benji@example.com </a></p>
        </section>

        <div class="contactformmap">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d91399.62265380844!2d-115.13001748118677!3d31.643191220309603!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2smx!4v1784679720942!5m2!1ses-419!2smx"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="strict-origin-when-cross-origin">
                </iframe>
            </div>
            <form>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
                <p>Purpose of Message:</p>
                <div class="radio-option">
                    <input type="radio" id="general" name="purpose" value="general" required>
                    <label for="general">General Inquiry</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="6" required></textarea>
                <div class="checkbox">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employeegallery">
                <figure>
                    <img src="images/guide1.webp" alt="John Smith">
                    <figcaption>John Smith - Senior River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/guide2.webp" alt="Sarah Johnson">
                    <figcaption>Sarah Johnson - Safety Instructor</figcaption>
                </figure>
                <figure>
                    <img src="images/guide3.webp" alt="Michael Lee">
                    <figcaption>Michael Lee - Expedition Leader</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Z Water Rafting | Benjamin Lopez Gonzalez</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-icon.webp" alt="Facebook Icon" width="100">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-icon.webp" alt="LinkedIn Icon" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-icon.webp" alt="Instagram Icon" width="100">
            </a>
        </nav>
    </footer>
</body>

</html>
